<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FoundryOS 88 - Simulatore Tablet</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f0c1b, #201a30);
            background-size: cover;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #fff;
        }

        #tablet-screen {
            width: 90vw;
            height: 85vh;
            max-width: 1024px;
            max-height: 768px;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-shadow: 0 0 8px #00f2fe;
            margin-bottom: 20px;
        }

        .app-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 25px;
            flex-grow: 1;
        }

        .app-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
        }

        .app-icon:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 12px #00f2fe);
        }

        .icon-box {
            width: 65px;
            height: 65px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            margin-bottom: 8px;
            box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.1);
        }

        .app-title {
            font-size: 12px;
            text-align: center;
            font-weight: 500;
        }

        .window {
            position: absolute;
            top: 10%;
            left: 5%;
            width: 90%;
            height: 80%;
            background: rgba(15, 12, 27, 0.95);
            border: 2px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            z-index: 10;
        }

        .window-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .close-btn {
            background: #ff5f56;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .window-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .store-item {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .download-btn {
            background: #00f2fe;
            color: #000;
            border: none;
            padding: 5px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="tablet-screen">
        <div class="status-bar">
            <div>FOUNDRYOS 88 v1.0</div>
            <div>RAM DETECTED: 64 GB</div>
        </div>

        <div class="app-grid">
            <div class="app-icon" onclick="openWindow('browser')">
                <div class="icon-box">🌐</div>
                <div class="app-title">Browser 88</div>
            </div>
            <div class="app-icon" onclick="openWindow('store')">
                <div class="icon-box">🛍️</div>
                <div class="app-title">Foundry Store</div>
            </div>
        </div>

        <div id="browser" class="window">
            <div class="window-header">
                <span>Browser Web Ultra-Leggero</span>
                <button class="close-btn" onclick="closeWindow('browser')"></button>
            </div>
            <div class="window-content">
                <iframe src="https://www.google.it/webhp?igu=1" style="width:100%; height:100%; border:none;"></iframe>
            </div>
        </div>

        <div id="store" class="window">
            <div class="window-header">
                <span>Foundry Store 88 - App Compatibili</span>
                <button class="close-btn" onclick="closeWindow('store')"></button>
            </div>
            <div class="window-content">
                <h3>Applicazioni Disponibili:</h3>
                <br>
                <div class="store-item">
                    <div><strong>DaVinci Resolve Mobile Control</strong><br><small>Utility di produzione video</small></div>
                    <button class="download-btn">INSTALLA</button>
                </div>
                <div class="store-item">
                    <div><strong>Spotify Artist Dashboard</strong><br><small>Gestisci la musica dell'album</small></div>
                    <button class="download-btn">INSTALLA</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openWindow(id) {
            document.getElementById(id).style.display = 'flex';
        }
        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
